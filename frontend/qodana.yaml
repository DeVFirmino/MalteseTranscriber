version: "1.0"
linter: jetbrains/qodana-js:latest
projectDir: .
ide: QDJS

profile:
  name: qodana.recommended

include:
  - name: CheckDependencyLicenses
  - name: VulnerableLibrariesGlobal

exclude:
  - name: All
    paths:
      - node_modules/
      - dist/

results:
  - path: qodana-results/frontend
